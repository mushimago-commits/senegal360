<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senegal 360 Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: sans-serif; }
  #viewer { width: 100vw; height: 100vh; }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    background: rgba(0,0,0,0.6);
    padding: 10px 18px;
    border-radius: 30px;
    z-index: 100;
  }
  #controls button {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  #controls button:hover { background: rgba(255,255,255,0.4); }
  #counter {
    color: #fff;
    font-size: 14px;
    min-width: 60px;
    text-align: center;
  }
  #progress {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: #4af;
    transition: width 0.3s;
    z-index: 200;
  }
</style>
</head>
<body>
<div id="progress"></div>
<div id="viewer"></div>
<div id="controls">
  <button onclick="prevPhoto()">◀ 前へ</button>
  <span id="counter">1 / 10</span>
  <button onclick="nextPhoto()">次へ ▶</button>
  <button onclick="toggleAuto()" id="autoBtn">⏸ 停止</button>
</div>

<script>
const ids = [
  "104AdzhOwra_E4HudppcG2m0I9ZzZXZZf",
  "1ye9DzgbfVZfw6HaEWHGVWQRq0exdNqCP",
  "1OtiAquUdAOJaUo2TzH2hPnmbiyLFw_ft",
  "1KhZ8JYljp1dynYm_O3J9hwbYq-ple1LR",
  "18s_uULCrEMcQ1lJQsEHm-2VqsJsT03f9",
  "1J5qNPKpO9MkELBhuGIuTlQXB1cZ3hNFL",
  "11kRo2EL369x--UR8lQPPpjCKqpLzRE1Z",
  "1xrepywE5ggLAJuv-FKf6wsO5K1Rd-1sW",
  "1DOZZw1ObU3OZbSqpDZ8oOUs5FplfgCiV",
  "19_sS-nchVum3cd-JefdI-VgDhUUYpVtX"
];

const INTERVAL = 6000; // 6秒
let current = 0;
let autoPlay = true;
let timer = null;
let viewer = null;

function imageUrl(id) {
  return `https://drive.google.com/uc?export=view&id=${id}`;
}

function updateCounter() {
  document.getElementById('counter').textContent = `${current + 1} / ${ids.length}`;
  const pct = ((current + 1) / ids.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

function loadPhoto(index) {
  current = index;
  updateCounter();
  if (viewer) {
    viewer.destroy();
  }
  viewer = pannellum.viewer('viewer', {
    type: 'equirectangular',
    panorama: imageUrl(ids[current]),
    autoLoad: true,
    autoRotate: -2,
    compass: false,
    showControls: false,
    hfov: 100
  });
}

function nextPhoto() {
  resetTimer();
  loadPhoto((current + 1) % ids.length);
}

function prevPhoto() {
  resetTimer();
  loadPhoto((current - 1 + ids.length) % ids.length);
}

function toggleAuto() {
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').textContent = autoPlay ? '⏸ 停止' : '▶ 自動';
  if (autoPlay) {
    startTimer();
  } else {
    clearInterval(timer);
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    loadPhoto((current + 1) % ids.length);
  }, INTERVAL);
}

function resetTimer() {
  if (autoPlay) {
    startTimer();
  }
}

// 初期化
loadPhoto(0);
startTimer();
</script>
</body>
</html>
