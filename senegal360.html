<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Senegal 360 Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: sans-serif; overflow: hidden; }
  #normal-mode { width: 100vw; height: 100vh; display: block; }
  #viewer { width: 100%; height: 100%; }
  #vr-mode { display: none; width: 100vw; height: 100vh; flex-direction: row; }
  #viewer-left { width: 50%; height: 100%; border-right: 2px solid #000; }
  #viewer-right { width: 50%; height: 100%; }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.6);
    padding: 10px 16px;
    border-radius: 30px;
    z-index: 100;
    transition: opacity 0.5s;
  }
  #controls button {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  #controls button:hover { background: rgba(255,255,255,0.4); }
  #vrBtn.active { background: rgba(100,180,255,0.6); }
  #counter { color: #fff; font-size: 14px; min-width: 55px; text-align: center; }
  #progress {
    position: fixed; top: 0; left: 0;
    height: 3px; background: #4af;
    transition: width 0.3s; z-index: 200;
  }
  #vr-tap {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 50;
  }
  #gyro-notice {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    color: #fff;
    padding: 24px 32px;
    border-radius: 14px;
    text-align: center;
    z-index: 300;
    font-size: 16px;
    line-height: 1.8;
  }
  #gyro-notice button {
    margin-top: 14px;
    padding: 10px 28px;
    background: #4af;
    border: none;
    border-radius: 20px;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="progress"></div>
<div id="normal-mode"><div id="viewer"></div></div>
<div id="vr-mode">
  <div id="viewer-left"></div>
  <div id="viewer-right"></div>
</div>
<div id="vr-tap"></div>
<div id="gyro-notice">
  <div>ジャイロセンサーを使用します。<br>「許可する」を押してください。</div>
  <button onclick="requestGyro()">許可する</button>
</div>
<div id="controls">
  <button onclick="prevPhoto()">◀</button>
  <span id="counter">1 / 11</span>
  <button onclick="nextPhoto()">▶</button>
  <button onclick="toggleAuto()" id="autoBtn">⏸ 停止</button>
  <button onclick="toggleVR()" id="vrBtn">👓 VR</button>
</div>

<script>
const files = [
  "R0015672.jpg","R0015702.JPG","R0015719.JPG","R0015726.JPG",
  "R0015749.JPG","R0015754.JPG","R0015768.JPG","R0015785.JPG",
  "R0015806.JPG","R0015818.JPG","R0015878.jpg"
];

const INTERVAL = 10000;
let current = 0;
let autoPlay = true;
let timer = null;
let vrMode = false;
let viewerNormal = null;
let viewerL = null;
let viewerR = null;
let gyroEnabled = false;
let gyroInterval = null;
let controlsTimer = null;

// ジャイロの現在値
let gyroPitch = 0;
let gyroYaw = 0;
// キャリブレーション用オフセット
let yawOffset = null;

function updateCounter() {
  document.getElementById('counter').textContent = `${current + 1} / ${files.length}`;
  document.getElementById('progress').style.width = ((current + 1) / files.length * 100) + '%';
}

function loadNormal(index) {
  if (viewerNormal) { viewerNormal.destroy(); viewerNormal = null; }
  viewerNormal = pannellum.viewer('viewer', {
    type: 'equirectangular',
    panorama: files[index],
    autoLoad: true,
    autoRotate: -2,
    compass: false,
    showControls: false,
    hfov: 100
  });
}

function loadVR(index) {
  if (viewerL) { viewerL.destroy(); viewerL = null; }
  if (viewerR) { viewerR.destroy(); viewerR = null; }
  const config = {
    type: 'equirectangular',
    panorama: files[index],
    autoLoad: true,
    autoRotate: false,
    compass: false,
    showControls: false,
    hfov: 90,
    pitch: 0,   // 初期視点：水平
    yaw: 0
  };
  viewerL = pannellum.viewer('viewer-left', Object.assign({}, config));
  viewerR = pannellum.viewer('viewer-right', Object.assign({}, config));
}

function handleOrientation(e) {
  if (!vrMode) return;

  const alpha = e.alpha || 0; // 方位角 0-360
  const beta  = e.beta  || 0; // 前後傾き -180〜180
  const gamma = e.gamma || 0; // 左右傾き -90〜90

  // 初回にyawのオフセットを記録（キャリブレーション）
  if (yawOffset === null) {
    yawOffset = alpha;
  }

  // スマホを横向き（VRゴーグル）に入れた場合：
  // gammaが上下（pitch）、alphaが左右（yaw）に対応
  const pitch = Math.max(-85, Math.min(85, -gamma));
  const yaw   = (alpha - yawOffset + 360) % 360;

  gyroPitch = pitch;
  gyroYaw   = yaw;
}

function startGyroLoop() {
  if (gyroInterval) clearInterval(gyroInterval);
  gyroInterval = setInterval(() => {
    if (!vrMode || !gyroEnabled) return;
    try {
      if (viewerL) { viewerL.setPitch(gyroPitch); viewerL.setYaw(gyroYaw); }
      if (viewerR) { viewerR.setPitch(gyroPitch); viewerR.setYaw(gyroYaw); }
    } catch(e) {}
  }, 50);
}

function requestGyro() {
  document.getElementById('gyro-notice').style.display = 'none';
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(state => {
      if (state === 'granted') {
        window.addEventListener('deviceorientation', handleOrientation, true);
        gyroEnabled = true;
        yawOffset = null;
        startGyroLoop();
      }
    }).catch(console.error);
  } else {
    window.addEventListener('deviceorientation', handleOrientation, true);
    gyroEnabled = true;
    yawOffset = null;
    startGyroLoop();
  }
}

function enableGyro() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('gyro-notice').style.display = 'block';
  } else {
    requestGyro();
  }
}

function disableGyro() {
  window.removeEventListener('deviceorientation', handleOrientation, true);
  gyroEnabled = false;
  yawOffset = null;
  if (gyroInterval) { clearInterval(gyroInterval); gyroInterval = null; }
}

function showControlsTemporarily() {
  const ctrl = document.getElementById('controls');
  ctrl.style.opacity = '1';
  ctrl.style.pointerEvents = 'auto';
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    ctrl.style.opacity = '0';
    ctrl.style.pointerEvents = 'none';
  }, 3000);
}

function loadPhoto(index) {
  current = index;
  updateCounter();
  vrMode ? loadVR(index) : loadNormal(index);
}

function nextPhoto() { resetTimer(); loadPhoto((current + 1) % files.length); }
function prevPhoto() { resetTimer(); loadPhoto((current - 1 + files.length) % files.length); }

function toggleAuto() {
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').textContent = autoPlay ? '⏸ 停止' : '▶ 自動';
  if (autoPlay) { startTimer(); } else { clearInterval(timer); }
}

function toggleVR() {
  vrMode = !vrMode;
  const btn = document.getElementById('vrBtn');
  const normalEl = document.getElementById('normal-mode');
  const vrEl = document.getElementById('vr-mode');
  const tapEl = document.getElementById('vr-tap');
  const ctrl = document.getElementById('controls');

  if (vrMode) {
    btn.textContent = '👁 通常';
    btn.classList.add('active');
    normalEl.style.display = 'none';
    vrEl.style.display = 'flex';
    tapEl.style.display = 'block';
    if (viewerNormal) { viewerNormal.destroy(); viewerNormal = null; }
    loadVR(current);
    enableGyro();
    ctrl.style.opacity = '1';
    controlsTimer = setTimeout(() => {
      ctrl.style.opacity = '0';
      ctrl.style.pointerEvents = 'none';
    }, 3000);
    tapEl.addEventListener('click', showControlsTemporarily);
  } else {
    btn.textContent = '👓 VR';
    btn.classList.remove('active');
    vrEl.style.display = 'none';
    normalEl.style.display = 'block';
    tapEl.style.display = 'none';
    ctrl.style.opacity = '1';
    ctrl.style.pointerEvents = 'auto';
    clearTimeout(controlsTimer);
    if (viewerL) { viewerL.destroy(); viewerL = null; }
    if (viewerR) { viewerR.destroy(); viewerR = null; }
    disableGyro();
    loadNormal(current);
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => loadPhoto((current + 1) % files.length), INTERVAL);
}

function resetTimer() {
  if (autoPlay) startTimer();
}

loadPhoto(0);
startTimer();
</script>
</body>
</html>
