<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Senegal 360 Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: sans-serif; }
  #viewer { width: 100vw; height: 100vh; }
  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    background: rgba(0,0,0,0.6);
    padding: 10px 18px;
    border-radius: 30px;
    z-index: 100;
  }
  #controls button {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  #controls button:hover { background: rgba(255,255,255,0.4); }
  #counter {
    color: #fff;
    font-size: 14px;
    min-width: 60px;
    text-align: center;
  }
  #progress {
    position: fixed;
    top: 0; left: 0;
    height: 3px;
    background: #4af;
    transition: width 0.3s;
    z-index: 200;
  }
</style>
</head>
<body>
<div id="progress"></div>
<div id="viewer"></div>
<div id="controls">
  <button onclick="prevPhoto()">◀ 前へ</button>
  <span id="counter">1 / 11</span>
  <button onclick="nextPhoto()">次へ ▶</button>
  <button onclick="toggleAuto()" id="autoBtn">⏸ 停止</button>
</div>

<script>
const files = [
  "R0015672.jpg",
  "R0015702.JPG",
  "R0015719.JPG",
  "R0015726.JPG",
  "R0015749.JPG",
  "R0015754.JPG",
  "R0015768.JPG",
  "R0015785.JPG",
  "R0015806.JPG",
  "R0015818.JPG",
  "R0015878.jpg"
];

const INTERVAL = 6000;
let current = 0;
let autoPlay = true;
let timer = null;
let viewer = null;

function updateCounter() {
  document.getElementById('counter').textContent = `${current + 1} / ${files.length}`;
  const pct = ((current + 1) / files.length) * 100;
  document.getElementById('progress').style.width = pct + '%';
}

function loadPhoto(index) {
  current = index;
  updateCounter();
  if (viewer) { viewer.destroy(); }
  viewer = pannellum.viewer('viewer', {
    type: 'equirectangular',
    panorama: files[current],
    autoLoad: true,
    autoRotate: -2,
    compass: false,
    showControls: false,
    hfov: 100
  });
}

function nextPhoto() {
  resetTimer();
  loadPhoto((current + 1) % files.length);
}

function prevPhoto() {
  resetTimer();
  loadPhoto((current - 1 + files.length) % files.length);
}

function toggleAuto() {
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').textContent = autoPlay ? '⏸ 停止' : '▶ 自動';
  if (autoPlay) { startTimer(); } else { clearInterval(timer); }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    loadPhoto((current + 1) % files.length);
  }, INTERVAL);
}

function resetTimer() {
  if (autoPlay) { startTimer(); }
}

loadPhoto(0);
startTimer();
</script>
</body>
</html>
