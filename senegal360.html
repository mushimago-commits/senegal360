<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Senegal 360 Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; font-family: sans-serif; overflow: hidden; }
  #normal-mode { width: 100vw; height: 100vh; display: block; }
  #viewer { width: 100%; height: 100%; }
  #vr-mode { display: none; width: 100vw; height: 100vh; flex-direction: row; }
  #viewer-left { width: 50%; height: 100%; border-right: 2px solid #000; }
  #viewer-right { width: 50%; height: 100%; }

  /* エンディング画面 */
  #ending {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: #000;
    color: #fff;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 500;
    gap: 24px;
  }
  #ending h2 {
    font-size: 22px;
    font-weight: bold;
    line-height: 1.6;
  }
  #ending p {
    font-size: 14px;
    color: #aaa;
  }
  #ending a.btn {
    display: inline-block;
    margin-top: 8px;
    padding: 14px 32px;
    background: #4285f4;
    color: #fff;
    text-decoration: none;
    border-radius: 28px;
    font-size: 16px;
  }
  #ending a.link {
    color: #7af;
    font-size: 13px;
    word-break: break-all;
    text-decoration: underline;
  }
  #ending button.replay {
    margin-top: 8px;
    padding: 10px 24px;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }

  #controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.6);
    padding: 10px 16px;
    border-radius: 30px;
    z-index: 100;
    transition: opacity 0.5s;
  }
  #controls button {
    background: rgba(255,255,255,0.2);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  #controls button:hover { background: rgba(255,255,255,0.4); }
  #vrBtn.active { background: rgba(100,180,255,0.6); }
  #counter { color: #fff; font-size: 14px; min-width: 55px; text-align: center; }
  #progress {
    position: fixed; top: 0; left: 0;
    height: 3px; background: #4af;
    transition: width 0.3s; z-index: 200;
  }
  #vr-tap {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: 50;
  }
</style>
</head>
<body>
<div id="progress"></div>

<div id="normal-mode"><div id="viewer"></div></div>
<div id="vr-mode">
  <div id="viewer-left"></div>
  <div id="viewer-right"></div>
</div>

<!-- エンディング -->
<div id="ending">
  <h2>More 360 Photos in Google</h2>
  <p>セネガル灌漑プロジェクト 360度写真アルバム</p>
  <a class="btn" href="https://photos.app.goo.gl/oV7kTd4Dt92XcfhRA" target="_blank">📷 Google Photos で見る</a>
  <a class="link" href="https://photos.app.goo.gl/oV7kTd4Dt92XcfhRA" target="_blank">https://photos.app.goo.gl/oV7kTd4Dt92XcfhRA</a>
  <button class="replay" onclick="replay()">↺ もう一度見る</button>
</div>

<div id="vr-tap"></div>

<div id="controls">
  <button onclick="prevPhoto()">◀</button>
  <span id="counter">1 / 11</span>
  <button onclick="nextPhoto()">▶</button>
  <button onclick="toggleAuto()" id="autoBtn">⏸ 停止</button>
  <button onclick="toggleVR()" id="vrBtn">👓 VR</button>
</div>

<script>
const files = [
  "R0015672.jpg","R0015702.JPG","R0015719.JPG","R0015726.JPG",
  "R0015749.JPG","R0015754.JPG","R0015768.JPG","R0015785.JPG",
  "R0015806.JPG","R0015818.JPG","R0015878.jpg"
];

const INTERVAL = 10000;
const AUTO_ROTATE_SPEED = 3.6; // 10秒で一周(360度/100fps相当)
let current = 0;
let autoPlay = true;
let timer = null;
let vrMode = false;
let viewerNormal = null;
let viewerL = null;
let viewerR = null;
let controlsTimer = null;

function updateCounter() {
  document.getElementById('counter').textContent = `${current + 1} / ${files.length}`;
  document.getElementById('progress').style.width = ((current + 1) / files.length * 100) + '%';
}

function loadNormal(index) {
  if (viewerNormal) { viewerNormal.destroy(); viewerNormal = null; }
  viewerNormal = pannellum.viewer('viewer', {
    type: 'equirectangular',
    panorama: files[index],
    autoLoad: true,
    autoRotate: AUTO_ROTATE_SPEED,
    autoRotateInactivityDelay: 1000,
    compass: false,
    showControls: false,
    hfov: 100,
    pitch: 0,
    yaw: 0
  });
}

function loadVR(index) {
  if (viewerL) { viewerL.destroy(); viewerL = null; }
  if (viewerR) { viewerR.destroy(); viewerR = null; }
  const config = {
    type: 'equirectangular',
    panorama: files[index],
    autoLoad: true,
    autoRotate: AUTO_ROTATE_SPEED,
    autoRotateInactivityDelay: 1000,
    compass: false,
    showControls: false,
    hfov: 90,
    pitch: 0,
    yaw: 0
  };
  viewerL = pannellum.viewer('viewer-left', Object.assign({}, config));
  viewerR = pannellum.viewer('viewer-right', Object.assign({}, config));
}

function loadPhoto(index) {
  current = index;
  updateCounter();
  vrMode ? loadVR(index) : loadNormal(index);
}

function showEnding() {
  clearInterval(timer);
  document.getElementById('ending').style.display = 'flex';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('progress').style.display = 'none';
  if (viewerNormal) { viewerNormal.destroy(); viewerNormal = null; }
  if (viewerL) { viewerL.destroy(); viewerL = null; }
  if (viewerR) { viewerR.destroy(); viewerR = null; }
}

function replay() {
  document.getElementById('ending').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('progress').style.display = 'block';
  current = 0;
  autoPlay = true;
  document.getElementById('autoBtn').textContent = '⏸ 停止';
  loadPhoto(0);
  startTimer();
}

function nextPhoto() {
  resetTimer();
  if (current >= files.length - 1) {
    showEnding();
  } else {
    loadPhoto(current + 1);
  }
}

function prevPhoto() {
  resetTimer();
  loadPhoto((current - 1 + files.length) % files.length);
}

function toggleAuto() {
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').textContent = autoPlay ? '⏸ 停止' : '▶ 自動';
  if (autoPlay) { startTimer(); } else { clearInterval(timer); }
}

function showControlsTemporarily() {
  const ctrl = document.getElementById('controls');
  ctrl.style.opacity = '1';
  ctrl.style.pointerEvents = 'auto';
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    ctrl.style.opacity = '0';
    ctrl.style.pointerEvents = 'none';
  }, 3000);
}

function toggleVR() {
  vrMode = !vrMode;
  const btn = document.getElementById('vrBtn');
  const normalEl = document.getElementById('normal-mode');
  const vrEl = document.getElementById('vr-mode');
  const tapEl = document.getElementById('vr-tap');
  const ctrl = document.getElementById('controls');

  if (vrMode) {
    btn.textContent = '👁 通常';
    btn.classList.add('active');
    normalEl.style.display = 'none';
    vrEl.style.display = 'flex';
    tapEl.style.display = 'block';
    if (viewerNormal) { viewerNormal.destroy(); viewerNormal = null; }
    loadVR(current);
    ctrl.style.opacity = '1';
    controlsTimer = setTimeout(() => {
      ctrl.style.opacity = '0';
      ctrl.style.pointerEvents = 'none';
    }, 3000);
    tapEl.addEventListener('click', showControlsTemporarily);
  } else {
    btn.textContent = '👓 VR';
    btn.classList.remove('active');
    vrEl.style.display = 'none';
    normalEl.style.display = 'block';
    tapEl.style.display = 'none';
    ctrl.style.opacity = '1';
    ctrl.style.pointerEvents = 'auto';
    clearTimeout(controlsTimer);
    if (viewerL) { viewerL.destroy(); viewerL = null; }
    if (viewerR) { viewerR.destroy(); viewerR = null; }
    loadNormal(current);
  }
}

function startTimer() {
  clearInterval(timer);
  timer = setInterval(() => {
    if (current >= files.length - 1) {
      showEnding();
    } else {
      loadPhoto(current + 1);
    }
  }, INTERVAL);
}

function resetTimer() {
  if (autoPlay) startTimer();
}

loadPhoto(0);
startTimer();
</script>
</body>
</html>
